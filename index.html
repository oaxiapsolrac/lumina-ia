<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lumina • Chat</title>
  
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    /* --- CSS DO DESIGN --- */
    :root {
      --fundoprincipal: #15101E;
      --bg: #ffffff;
      --text: #e3dcdc;
      --border: #ffffff;
      --primary-a: #83097f;
      --primary-b: #ba49b0;
      --surface: #f7f7f7;
      --lateralE: #251C35;
      --cinzabalaousuario: #bfb7b7;
      --radius: 16px; 
      --max-w: 860px;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; background: var(--fundoprincipal); }
    body {
      margin: 0;
      color: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      display: flex;
      flex-direction: column;
    }
    header {
      position: sticky;
      top: 0;
      background: transparent;
      border-bottom: 1px solid transparent;
      z-index: 1;
    }
    .header-inner {
      max-width: var(--max-w);
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
    }
    .menu-btn { display: none; margin-left: auto; border: none; background: transparent; font-size: 22px; cursor: pointer; }
    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.25); z-index: 99; }
    body.menu-open { overflow: hidden; }
    .logo, .logo-img { width: 45px; height: 45px; }
    .brand { font-weight: 900; letter-spacing: 6px; }
    
    .sidebar {
      position: fixed;
      top: 0; left: 0; bottom: 0;
      width: 290px;
      background: var(--lateralE);
      border-right: 1px solid transparent;
      padding-top: 80px;
      display: flex;
      flex-direction: column;
    }
    .new-chat {
      font-size: 15px;
      margin: 12px 16px;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      background: var(--surface);
      cursor: pointer;
    }
    .history {
      list-style: none;
      padding: 0;
      margin: 6px 8px;
      overflow-y: auto;
      flex: 1;
    }
    .history-item {
      border-radius: 8px;
      padding: 10px 10px;
      margin: 4px 8px;
      border: 1px solid transparent;
      background: var(--lateralE);
      cursor: pointer;
      color: var(--text);
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      justify-content: space-between;
    }
    .history-item .title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .delete-btn {
      border: none;
      background: transparent;
      color: var(--muted);
      font-size: 14px;
      padding: 4px 8px;
      border-radius: 6px;
      cursor: pointer;
    }
    .delete-btn:hover { background: #F5F5F5; color: #090909; }
    
    main { flex: 1; }
    .content {
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 32px 20px 108px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      margin-left: 280px;
    }
    .message {
      display: flex;
      gap: 12px;
      justify-content: flex-start;
      width: 100%;
    }
    .message .bubble { max-width: 75%; }
    .message.from-user { flex-direction: row-reverse; justify-content: flex-end; }
    .avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: transparent;
      flex-shrink: 0;
    }
    .bubble {
      background: var(--transparent);
      border: 1px solid var(--transparent);
      border-radius: var(--radius);
      padding: 14px 16px;
      line-height: 1.6;
    }
    .from-user .avatar { background: transparent; }
    .message:not(.from-user) .avatar {
      background-image: url('logo.png');
      background-size: cover;
      background-position: center;
      background-color: transparent;
    }
    .from-user .bubble { background: var(--transparent); text-align: right; margin-left: auto; }
    
    .bubble p { margin: 0 0 10px 0; }
    .bubble p:last-child { margin: 0; }
    .bubble ul, .bubble ol { margin: 5px 0 5px 20px; padding: 0; }
    .bubble li { margin-bottom: 5px; }
    .bubble strong, .bubble b { font-weight: 700; color: var(--primary-a); }
    
    /* --- BARRA DE DIGITAÇÃO --- */
    .composer {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 750px;
      padding: 0 20px;
      background: transparent;
      border: none;
      z-index: 100;
    }

    .composer-inner {
      background: #1E1F20;
      border-radius: 24px;
      padding: 8px 12px 8px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0px 4px 19px rgba(202, 202, 202, 0.2);
      border: 1px solid #333;
    }

    .input {
      flex: 1;
      background: transparent;
      border: none;
      color: #e3e2e2;
      font-size: 16px;
      outline: none;
      padding: 10px 0;
    }

    .input::placeholder { color: #8E918F; }

    /* ESTILO DO MICROFONE */
    .mic-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: none;
      background: transparent;
      color: #8E918F;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .mic-btn:hover {
        background: rgba(255, 255, 255, 0.1);
        color: #fff;
    }
    
    /* Animação Gravando */
    .mic-btn.recording {
        color: #e74c3c; 
        background: rgba(231, 76, 60, 0.1);
        animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
        0% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.4); }
        70% { box-shadow: 0 0 0 10px rgba(231, 76, 60, 0); }
        100% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0); }
    }

    button#send {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: none;
      background: var(--primary-a);
      color: white;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }
    .send-icon { width: 18px; height: 18px; display: block; }
    
    button#send:hover { filter: brightness(1.2); }
    button#send:disabled { background: #a13d9c; opacity: 0.5; cursor: not-allowed; }
    
    @media (max-width: 768px) {
      .menu-btn { display: block; }
      .logo, .logo-img { width: 36px; height: 36px; }
      .header-inner { padding: 10px 14px; }
      .sidebar { display: none; width: 100%; height: auto; padding-top: 60px; border-right: none; }
      .sidebar.open { display: flex; position: fixed; top: 0; left: 0; right: auto; bottom: 0; width: 85%; max-width: 360px; z-index: 100; }
      .overlay.show { display: block; }
      .content { margin-left: 0; padding: 20px 12px 96px; }
      .message .bubble { max-width: 100%; }
      .composer { left: 0; transform: none; max-width: 100%; bottom: 10px; padding: 0 10px; }
    }
    .typing { display: inline-flex; align-items: center; gap: 6px; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: #BDBDBD; animation: dots 1s ease-in-out infinite; }
    .dot:nth-child(2) { animation-delay: 0.15s; }
    .dot:nth-child(3) { animation-delay: 0.3s; }
    @keyframes dots { 0% { opacity: 0.2; transform: translateY(0); } 50% { opacity: 1; transform: translateY(-2px); } 100% { opacity: 0.2; transform: translateY(0); } }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <img class="logo-img" src="logo.png" alt="LUMINA" onerror="this.src='logo.png'"/>
      <div class="brand">LUMINA</div>
      <button id="toggleSidebar" class="menu-btn" aria-label="Menu">☰</button>
    </div>
  </header>
  <div id="overlay" class="overlay"></div>
  <main>
    <aside class="sidebar">
      <button id="newChat" class="new-chat">Novo chat</button>
      <ul id="history" class="history"></ul>
    </aside>
    <div class="content">
      </div>
  </main>

  <div class="composer">
    <div class="composer-inner">
      <input id="prompt" class="input" type="text" placeholder="Pergunte sobre mulheres na tech..." autocomplete="off"/>
      
      <button id="micBtn" class="mic-btn" aria-label="Gravar áudio">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
            <line x1="12" y1="19" x2="12" y2="23"></line>
            <line x1="8" y1="23" x2="16" y2="23"></line>
        </svg>
      </button>

      <button id="send" class="send" disabled aria-label="Enviar">
        <img src="enviar.png" alt="Enviar" class="send-icon" onerror="this.style.display='none'"/>
        <span style="font-size:18px;">➤</span>
      </button>
    </div>
  </div>

<script>
    const input = document.getElementById('prompt');
    const send = document.getElementById('send');
    const historyEl = document.getElementById('history');
    const newChatBtn = document.getElementById('newChat');
    const toggleBtn = document.getElementById('toggleSidebar');
    const overlay = document.getElementById('overlay');
    const micBtn = document.getElementById('micBtn'); 
    
    let currentConversationId = null;

    // --- 1. LÓGICA DO MICROFONE (INPUT) ---
    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      const recognition = new SpeechRecognition();
      
      recognition.lang = 'pt-BR';
      recognition.continuous = false;
      recognition.interimResults = false;

      recognition.onstart = function() {
        micBtn.classList.add('recording');
        input.placeholder = "Ouvindo... Pode falar...";
      };

      recognition.onend = function() {
        micBtn.classList.remove('recording');
        input.placeholder = "Pergunte sobre mulheres na tech...";
      };

      recognition.onresult = function(event) {
        const transcript = event.results[0][0].transcript;
        input.value = transcript;
        send.disabled = false;
        input.focus();
      };

      micBtn.addEventListener('click', () => {
        if (micBtn.classList.contains('recording')) {
          recognition.stop();
        } else {
          recognition.start();
        }
      });
      
    } else {
      micBtn.style.display = 'none';
      console.log("Navegador sem suporte a Web Speech API");
    }

    // --- 2. HISTÓRICO ---
    function loadHistory() {
      const raw = localStorage.getItem('wd-history');
      const list = raw ? JSON.parse(raw) : [];
      historyEl.innerHTML = '';
      list.forEach(item => {
        const li = document.createElement('li');
        li.className = 'history-item';
        li.dataset.id = item.id;
        const title = document.createElement('span');
        title.className = 'title';
        title.textContent = item.title || 'Sem título';
        const del = document.createElement('button');
        del.className = 'delete-btn';
        del.textContent = '×';
        li.appendChild(title);
        li.appendChild(del);
        li.addEventListener('click', () => loadConversation(item.id));
        del.addEventListener('click', (e) => { e.stopPropagation(); deleteConversation(item.id); });
        historyEl.appendChild(li);
      });
    }

    function saveHistory(history) {
      localStorage.setItem('wd-history', JSON.stringify(history));
    }

    function getHistory() {
      const raw = localStorage.getItem('wd-history');
      return raw ? JSON.parse(raw) : [];
    }

    function deleteConversation(id) {
      let history = getHistory();
      history = history.filter(h => h.id !== id);
      saveHistory(history);
      if (currentConversationId === id) {
        currentConversationId = null;
        renderAssistantGreeting();
      }
      loadHistory();
    }

    // --- 3. INTERFACE ---
    function renderAssistantGreeting() {
      const content = document.querySelector('.content');
      content.innerHTML = '';
      const msg = document.createElement('div');
      msg.className = 'message';
      const avatar = document.createElement('div');
      avatar.className = 'avatar';
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = 'Olá! Sou a LUMINA. Pergunte-me sobre mulheres na tecnologia!';
      msg.appendChild(avatar);
      msg.appendChild(bubble);
      content.appendChild(msg);
    }

    function loadConversation(id) {
      const history = getHistory();
      const conv = history.find(h => h.id === id);
      if (!conv) return;
      currentConversationId = id;
      const content = document.querySelector('.content');
      content.innerHTML = '';
      conv.messages.forEach(m => {
        appendMessage(m.role, m.text, false);
      });
      window.scrollTo(0, document.body.scrollHeight);
    }

    function startNewConversation() {
      currentConversationId = null;
      renderAssistantGreeting();
    }

    function appendMessage(role, text, autoScroll = true) {
      const content = document.querySelector('.content');
      const msg = document.createElement('div');
      msg.className = 'message' + (role === 'user' ? ' from-user' : '');
      const avatar = document.createElement('div');
      avatar.className = 'avatar';
      const bubble = document.createElement('div');
      bubble.className = 'bubble';

      if (role === 'user') {
        bubble.textContent = text;
      } else {
        bubble.innerHTML = marked.parse(text);
      }

      msg.appendChild(avatar);
      msg.appendChild(bubble);
      content.appendChild(msg);
      if(autoScroll) window.scrollTo(0, document.body.scrollHeight);
    }

    function appendTyping() {
      const content = document.querySelector('.content');
      const msg = document.createElement('div');
      msg.className = 'message';
      const avatar = document.createElement('div');
      avatar.className = 'avatar';
      const bubble = document.createElement('div');
      bubble.className = 'bubble typing';
      const d1 = document.createElement('span'); d1.className = 'dot';
      const d2 = document.createElement('span'); d2.className = 'dot';
      const d3 = document.createElement('span'); d3.className = 'dot';
      bubble.appendChild(d1); bubble.appendChild(d2); bubble.appendChild(d3);
      msg.appendChild(avatar);
      msg.appendChild(bubble);
      content.appendChild(msg);
      window.scrollTo(0, document.body.scrollHeight);
      return msg;
    }

    // --- 4. FUNÇÃO DE FALA (OUTPUT - RESTAURADA) ---
    function speakText(text) {
      window.speechSynthesis.cancel(); // Para falas anteriores
      const cleanText = text.replace(/[*#_`]/g, ''); 
      const utterance = new SpeechSynthesisUtterance(cleanText);
      utterance.lang = 'pt-BR';
      utterance.rate = 1.1; 
      window.speechSynthesis.speak(utterance);
    }

    // --- 5. ENVIO E CONEXÃO ---
    input.addEventListener('input', () => { send.disabled = !input.value.trim(); });
    input.addEventListener('keydown', e => { if (e.key === 'Enter' && !send.disabled) { e.preventDefault(); send.click(); } });
    newChatBtn.addEventListener('click', startNewConversation);
    
    function toggleMenu() {
      const sb = document.querySelector('.sidebar');
      const isOpen = sb.classList.toggle('open');
      if (overlay) overlay.classList.toggle('show', isOpen);
      document.body.classList.toggle('menu-open', isOpen);
      if (toggleBtn) toggleBtn.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
    }
    if (toggleBtn) toggleBtn.addEventListener('click', toggleMenu);
    if (overlay) overlay.addEventListener('click', toggleMenu);
    window.addEventListener('keydown', (e) => { if (e.key === 'Escape') { const sb = document.querySelector('.sidebar'); if (sb.classList.contains('open')) toggleMenu(); }});

    send.addEventListener('click', async () => {
      const text = input.value.trim();
      if (!text) return;

      appendMessage('user', text);
      
      let history = getHistory();
      if (!currentConversationId) {
        currentConversationId = Date.now().toString();
        history.unshift({ id: currentConversationId, title: text.slice(0, 40), messages: [] });
      }
      const idx = history.findIndex(h => h.id === currentConversationId);
      if (idx !== -1) {
        history[idx].messages.push({ role: 'user', text });
        saveHistory(history);
        loadHistory(); 
      }

      input.value = '';
      send.disabled = true;

      const typingEl = appendTyping();

      try {
        const response = await fetch('https://lumina-backend-zsak.onrender.com/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ mensagem: text })
        });

        const data = await response.json();
        
        typingEl.remove();
        
        const reply = data.resposta;
        
        // CHAMA A FUNÇÃO DE FALA AQUI
        speakText(reply);

        const content = document.querySelector('.content');
        const msg = document.createElement('div');
        msg.className = 'message';
        const avatar = document.createElement('div');
        avatar.className = 'avatar';
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        msg.appendChild(avatar);
        msg.appendChild(bubble);
        content.appendChild(msg);

        const finalHtml = marked.parse(reply);
        typeWriter(finalHtml, bubble);

        let h = getHistory();
        const i = h.findIndex(v => v.id === currentConversationId);
        if (i !== -1) {
          h[i].messages.push({ role: 'assistant', text: reply });
          saveHistory(h);
        }

      } catch (error) {
        typingEl.remove();
        console.error(error);
        appendMessage('assistant', "⚠️ Erro: Não foi possível conectar ao servidor.");
      }
    });

    function typeWriter(htmlText, element, speed = 20) {
      let i = 0;
      element.innerHTML = ''; 
      element.style.borderRight = '3px solid var(--primary-a)';
      element.style.paddingRight = '5px';

      const intervalId = setInterval(() => {
        i++; 
        if (i > htmlText.length) { i = htmlText.length; }
        
        element.innerHTML = htmlText.substring(0, i);
        window.scrollTo(0, document.body.scrollHeight);

        if (i === htmlText.length) {
          clearInterval(intervalId);
          element.style.borderRight = 'none';
          element.style.paddingRight = '16px'; 
        }
      }, speed); 
    }

    // Inicia o app
    loadHistory();
    renderAssistantGreeting();
</script>
</body>
</html>
