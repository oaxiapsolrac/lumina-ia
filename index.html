<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>Lumina • Chat</title>
  
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    :root {
      --bg-main: #0a0514;
      --bg-sidebar: #120a24;
      --bg-input: #1b1133;
      --accent-pink: #ff00d4;
      --accent-purple: #9d00ff;
      --text-main: #f5edff;
      --text-muted: #b399cc;
      --user-bubble: #2d134d;
      --max-w: 800px;
      --header-h: 64px;
    }

    * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    
    html, body { 
      height: 100%; margin: 0; 
      background: var(--bg-main); color: var(--text-main);
      overflow: hidden;
    }

    /* --- SIDEBAR (HISTÓRICO) --- */
    .sidebar {
      position: fixed;
      left: 0; top: 0; bottom: 0;
      width: 280px;
      background: var(--bg-sidebar);
      transform: translateX(-100%);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 1001;
      padding: 20px 12px;
      padding-top: calc(20px + env(safe-area-inset-top));
      border-right: 1px solid #2d1b4d;
      display: flex;
      flex-direction: column;
    }
    .sidebar.open { transform: translateX(0); }

    .overlay { 
      display: none; position: fixed; inset: 0; 
      background: rgba(0,0,0,0.7); z-index: 1000; 
    }
    .overlay.show { display: block; }

    .new-chat {
      background: linear-gradient(45deg, var(--accent-purple), var(--accent-pink));
      border: none; color: white; padding: 14px; border-radius: 16px;
      cursor: pointer; font-weight: bold; margin-bottom: 25px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      flex-shrink: 0;
    }

    .history { list-style: none; padding: 0; margin: 0; overflow-y: auto; flex: 1; }
    .history-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px; border-radius: 12px; cursor: pointer;
      font-size: 14px; color: var(--text-muted); margin-bottom: 5px;
      transition: 0.2s;
    }
    .history-item:hover { background: #251642; color: var(--accent-pink); }
    .history-item .title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .delete-btn { background: none; border: none; color: #ff4d4d; cursor: pointer; font-size: 18px; padding-left: 10px; opacity: 0.6; }
    .delete-btn:hover { opacity: 1; }

    /* --- LAYOUT --- */
    main { display: flex; flex-direction: column; height: 100vh; width: 100vw; }

    header {
      height: var(--header-h); padding: 0 20px;
      padding-top: env(safe-area-inset-top);
      display: flex; align-items: center; gap: 15px;
      background: var(--bg-main); z-index: 50; flex-shrink: 0;
    }

    .menu-btn { background: none; border: none; color: var(--accent-pink); font-size: 28px; cursor: pointer; }
    .brand { font-weight: 800; font-size: 22px; color: var(--accent-pink); text-transform: uppercase; letter-spacing: 2px; }

    /* ÁREA DE MENSAGENS */
    .content-scroll {
      flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
      padding-bottom: 160px; /* Espaço para o composer não tampar a msg */
    }
    .content {
      width: 100%; max-width: var(--max-w); margin: 0 auto;
      padding: 20px; display: flex; flex-direction: column; gap: 32px;
    }

    .message { display: flex; gap: 15px; width: 100%; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }
    
    .avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background-size: cover; border: 1.5px solid var(--accent-pink); flex-shrink: 0;
    }
    .message.from-user { flex-direction: row-reverse; }
    .message.from-user .bubble {
      background: var(--user-bubble);
      padding: 12px 20px; border-radius: 20px 20px 4px 20px;
      max-width: 85%; border: 1px solid #3d2566;
    }
    .message:not(.from-user) .bubble { flex: 1; line-height: 1.6; }
    .message:not(.from-user) .avatar { background-image: url('logo.png'); box-shadow: 0 0 10px var(--accent-pink); }
    .from-user .avatar { display: none; }
    .bubble strong { color: var(--accent-pink); }

    /* BARRA DE DIGITAÇÃO FIXA */
    .composer {
      position: fixed; bottom: 0; left: 0; right: 0;
      padding: 20px; padding-bottom: calc(20px + env(safe-area-inset-bottom));
      background: linear-gradient(transparent, var(--bg-main) 30%);
      display: flex; justify-content: center; z-index: 100;
    }
    .composer-inner {
      width: 100%; max-width: var(--max-w);
      background: var(--bg-input); border-radius: 32px;
      padding: 8px 12px 8px 20px; display: flex; align-items: center; gap: 8px;
      border: 1px solid #3d2566; box-shadow: 0 10px 40px rgba(0,0,0,0.6);
    }
    .input {
      flex: 1; background: transparent; border: none;
      color: var(--text-main); font-size: 16px; outline: none; padding: 12px 0;
    }

    .mic-btn, .send-btn, #voiceToggle {
      width: 44px; height: 44px; border-radius: 50%; border: none;
      background: transparent; color: var(--text-muted); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .mic-btn.recording { color: #ff0000; animation: pulse 1s infinite; }
    @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

    .typing { display: flex; gap: 5px; padding: 10px 0; }
    .dot { width: 8px; height: 8px; background: var(--accent-pink); border-radius: 50%; animation: bounce 1.4s infinite ease-in-out; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%, 80%, 100% { transform: scale(0.3); } 40% { transform: scale(1); } }
  </style>
</head>
<body>

  <div id="overlay" class="overlay"></div>

  <aside class="sidebar" id="sidebar">
    <button id="newChat" class="new-chat"><span>+</span> Novo Chat</button>
    <ul id="history" class="history"></ul>
  </aside>

  <main>
    <header>
      <button id="toggleSidebar" class="menu-btn">☰</button>
      <div class="brand">Lumina</div>
    </header>

    <div class="content-scroll" id="scroll-area">
      <div class="content" id="chat-content"></div>
    </div>

    <div class="composer">
      <div class="composer-inner">
        <button id="voiceToggle" title="Voz" style="font-size: 20px; color: var(--accent-pink);">🔊</button>
        <input id="prompt" class="input" type="text" placeholder="Pergunte sobre mulheres na tech..." autocomplete="off"/>
        
        <button id="micBtn" class="mic-btn">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
        </button>

        <button id="send" class="send-btn" disabled>
          <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>
  </main>

<script>
    const API_URL = 'https://lumina-backend-zsak.onrender.com/chat';
    let voiceEnabled = true;
    let currentConversationId = null;

    const input = document.getElementById('prompt');
    const send = document.getElementById('send');
    const chatContent = document.getElementById('chat-content');
    const historyEl = document.getElementById('history');
    const scrollArea = document.getElementById('scroll-area');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');

    function destravarAudio() {
        const kickstart = new SpeechSynthesisUtterance("");
        window.speechSynthesis.speak(kickstart);
    }

    // --- VOZ ---
    document.getElementById('voiceToggle').addEventListener('click', (e) => {
        destravarAudio();
        voiceEnabled = !voiceEnabled;
        e.target.textContent = voiceEnabled ? '🔊' : '🔈';
        e.target.style.color = voiceEnabled ? '#ff00d4' : '#b399cc';
        if (!voiceEnabled) window.speechSynthesis.cancel();
    });

    // --- MICROFONE ---
    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
      const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
      recognition.lang = 'pt-BR';
      recognition.onstart = () => document.getElementById('micBtn').classList.add('recording');
      recognition.onend = () => document.getElementById('micBtn').classList.remove('recording');
      recognition.onresult = (e) => { input.value = e.results[0][0].transcript; send.disabled = false; input.focus(); };
      document.getElementById('micBtn').addEventListener('click', () => { destravarAudio(); try{recognition.start()}catch(e){recognition.stop()} });
    }

    // --- LÓGICA DE HISTÓRICO ---
    function getHistory() { return JSON.parse(localStorage.getItem('wd-history') || '[]'); }
    function saveHistory(h) { localStorage.setItem('wd-history', JSON.stringify(h)); }

    function loadHistoryList() {
      const history = getHistory();
      historyEl.innerHTML = '';
      history.forEach(item => {
        const li = document.createElement('li');
        li.className = 'history-item';
        li.innerHTML = `<span class="title">${item.title}</span><button class="delete-btn">×</button>`;
        li.onclick = () => { loadConversation(item.id); toggleMenu(); };
        li.querySelector('.delete-btn').onclick = (e) => { e.stopPropagation(); deleteConversation(item.id); };
        historyEl.appendChild(li);
      });
    }

    function deleteConversation(id) {
      const h = getHistory().filter(x => x.id !== id);
      saveHistory(h);
      if (currentConversationId === id) startNewConversation();
      loadHistoryList();
    }

    function loadConversation(id) {
      const conv = getHistory().find(x => x.id === id);
      if (!conv) return;
      currentConversationId = id;
      chatContent.innerHTML = '';
      conv.messages.forEach(m => appendMessage(m.role, m.text, false));
    }

    function startNewConversation() {
      currentConversationId = null;
      chatContent.innerHTML = '';
      appendMessage('assistant', 'Olá! Sou a LUMINA. Pergunte-me sobre mulheres na tecnologia!');
    }

    // --- INTERFACE ---
    function appendMessage(role, text, scroll = true) {
      const msg = document.createElement('div');
      msg.className = 'message' + (role === 'user' ? ' from-user' : '');
      const avatar = document.createElement('div'); avatar.className = 'avatar';
      const bubble = document.createElement('div'); bubble.className = 'bubble';
      
      if (role === 'user') bubble.textContent = text;
      else bubble.innerHTML = marked.parse(text);
      
      msg.appendChild(avatar); msg.appendChild(bubble);
      chatContent.appendChild(msg);
      if(scroll) scrollArea.scrollTo({ top: scrollArea.scrollHeight, behavior: 'smooth' });
    }

    function appendTyping() {
      const msg = document.createElement('div');
      msg.className = 'message';
      msg.innerHTML = `<div class="avatar"></div><div class="bubble"><div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
      chatContent.appendChild(msg);
      scrollArea.scrollTo({ top: scrollArea.scrollHeight, behavior: 'smooth' });
      return msg;
    }

    function typeWriter(html, el) {
      let i = 0;
      const interval = setInterval(() => {
        el.innerHTML = html.substring(0, i);
        if (i++ >= html.length) {
            clearInterval(interval);
            scrollArea.scrollTo({ top: scrollArea.scrollHeight, behavior: 'smooth' });
        }
      }, 10);
    }

    function speakText(t) {
      if (!voiceEnabled) return;
      window.speechSynthesis.cancel(); 
      const u = new SpeechSynthesisUtterance(t.replace(/[*#_`]/g, '')); u.lang = 'pt-BR';
      window.speechSynthesis.speak(u);
    }

    // --- EVENTOS ---
    input.addEventListener('input', () => send.disabled = !input.value.trim());
    input.addEventListener('keydown', e => { if(e.key==='Enter' && !send.disabled) send.click(); });
    
    function toggleMenu() { sidebar.classList.toggle('open'); overlay.classList.toggle('show'); }
    document.getElementById('toggleSidebar').onclick = toggleMenu;
    overlay.onclick = toggleMenu;
    document.getElementById('newChat').onclick = () => { startNewConversation(); toggleMenu(); };

    send.onclick = async () => {
      destravarAudio();
      const text = input.value.trim();
      if (!text) return;

      appendMessage('user', text);
      input.value = ''; send.disabled = true;

      if (!currentConversationId) {
        currentConversationId = Date.now().toString();
        const h = getHistory();
        h.unshift({ id: currentConversationId, title: text.slice(0, 30), messages: [] });
        saveHistory(h);
      }

      const typingEl = appendTyping();
      try {
        const res = await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ mensagem: text })
        });
        const data = await res.json();
        typingEl.remove();
        const reply = data.resposta;
        
        speakText(reply);

        const msg = document.createElement('div'); msg.className = 'message';
        msg.innerHTML = `<div class="avatar"></div><div class="bubble"></div>`;
        chatContent.appendChild(msg);
        typeWriter(marked.parse(reply), msg.querySelector('.bubble'));

        // Salvar no histórico
        const h = getHistory();
        const idx = h.findIndex(v => v.id === currentConversationId);
        if (idx !== -1) {
          h[idx].messages.push({ role: 'user', text }, { role: 'assistant', text: reply });
          saveHistory(h);
          loadHistoryList();
        }
      } catch (e) {
        typingEl.remove();
        appendMessage('assistant', "⚠️ Erro ao conectar ao servidor.");
      }
    };

    document.body.addEventListener('click', function() {
        const kickstart = new SpeechSynthesisUtterance("");
        window.speechSynthesis.speak(kickstart);
    }, { once: true }); // "once: true" garante que isso rode apenas no primeiro clique
    // Início
    loadHistoryList();
    startNewConversation();
  
</script>
</body>
</html>
